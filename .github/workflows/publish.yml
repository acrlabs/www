---
name: publish next website
on:  # yamllint disable-line rule:truthy
  push:
    branches:
      - "main"
  workflow_dispatch: {}

permissions: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo and build scripts
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Install cargo-binstall
        uses: taiki-e/install-action@6ef672efc2b5aabc787a9e94baf4989aa02a97df  # v2.70.3
        with:
          tool: cargo-binstall

      - name: Install just
        uses: taiki-e/install-action@6ef672efc2b5aabc787a9e94baf4989aa02a97df  # v2.70.3
        with:
          tool: just

      - name: Setup python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.11"

      - name: Install SSH key
        uses: shimataro/ssh-key-action@87a8f067114a8ce263df83e9ed5c849953548bc3  # v2.8.1
        with:
          key: ${{ secrets.WWWKEY }}
          known_hosts: ${{ secrets.KNOWN_HOSTS }}

      - name: Install poetry
        uses: snok/install-poetry@76e04a911780d5b312d89783f7b1cd627778900a  # v1.4.1

      - name: Install deps
        run: poetry install

      - name: Install apps
        run: cargo binstall skctl sk-ctrl sk-driver sk-tracer -y

      - name: Publish ACRL
        run: just publish acrl

      - name: Publish Simkube
        run: just publish simkube
